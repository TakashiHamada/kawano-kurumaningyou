<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>川野車人形練習アプリ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: manipulation;
        }

        .player-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .audio-player {
            margin: 10px 0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            flex: 1;
            max-width: 150px;
            touch-action: manipulation;
        }

        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .play-button:active {
            transform: translateY(0);
        }

        .play-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            outline: none;
        }

        .status {
            margin-top: 8px;
            color: #666;
            font-size: 14px;
            min-height: 20px;
        }

        .audio-info {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
        }

        .audio-info h2 {
            color: #333;
            font-size: 18px;
            margin: 0 0 6px 0;
            border-bottom: 2px solid #667eea;
            padding-bottom: 6px;
        }

        .info-item {
            margin: 4px 0;
            color: #555;
            font-size: 14px;
        }

        .info-label {
            font-weight: bold;
            color: #667eea;
            display: inline-block;
            width: 100px;
        }

        .audio-selector {
            margin-bottom: 10px;
        }

        .audio-selector select {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            touch-action: manipulation;
        }

        .audio-selector select:hover {
            border-color: #764ba2;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .audio-selector select:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .reload-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            touch-action: manipulation;
            z-index: 100;
        }

        .reload-button:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.6);
        }

        .reload-button:active {
            transform: rotate(180deg) scale(0.95);
        }

        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .orientation-warning-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: rotate-phone 2s ease-in-out infinite;
        }

        .orientation-warning-text {
            font-size: 24px;
            font-weight: bold;
        }

        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        .loop-controls {
            margin-top: 10px;
            padding: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }

        .loop-controls-label {
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .loop-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .loop-button {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(67, 233, 123, 0.3);
            touch-action: manipulation;
        }

        .loop-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 233, 123, 0.5);
        }

        .loop-button:active {
            transform: translateY(0);
        }

        .loop-button.clear-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.3);
        }

        .loop-button.clear-button:hover {
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.5);
        }

        .loop-range-display {
            margin-top: 10px;
            font-size: 15px;
            color: #555;
            min-height: 22px;
        }

        .speed-controls {
            margin-top: 10px;
        }

        .speed-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .speed-button {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 8px 18px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .speed-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .speed-button:active {
            transform: translateY(0);
        }

        .speed-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        @media screen and (orientation: landscape) and (max-height: 500px) {
            .orientation-warning {
                display: flex;
            }
            .player-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="orientation-warning">
        <div class="orientation-warning-icon">📱</div>
        <div class="orientation-warning-text">画面を縦向きにしてください</div>
    </div>

    <button class="reload-button" id="reloadBtn" title="ページをリロード">🔄</button>

    <div class="player-container">
        <div class="audio-selector">
            <select id="audioSelect">
                <option value="">読み込み中...</option>
            </select>
        </div>

        <div class="audio-info" id="audioInfo">
            <h2 id="audioTitle">音声情報</h2>
            <div class="info-item">
                <span class="info-label">話者:</span>
                <span id="speaker">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">収録年月日:</span>
                <span id="recordedDate">-</span>
            </div>
        </div>

        <div class="audio-player">
            <audio id="audioPlayer" controls loop>
                <source src="" type="audio/mpeg">
                お使いのブラウザは音声再生に対応していません。
            </audio>
        </div>

        <div class="button-container">
            <button class="play-button" id="playPauseBtn">▶ 再生</button>
            <button class="play-button" id="rewindBtn">5秒戻す</button>
        </div>

        <div class="loop-controls">
            <div class="loop-controls-label">ループ範囲設定</div>
            <div class="loop-buttons">
                <button class="loop-button" id="loopStartBtn">ここから</button>
                <button class="loop-button" id="loopEndBtn">ここまで</button>
                <button class="loop-button clear-button" id="loopClearBtn">解除</button>
            </div>
            <div class="loop-range-display" id="loopRangeDisplay">全体をループ再生</div>
        </div>

        <div class="speed-controls">
            <div class="speed-buttons">
                <button class="speed-button" data-speed="0.6">0.6x</button>
                <button class="speed-button" data-speed="0.8">0.8x</button>
                <button class="speed-button active" data-speed="1">1.0x</button>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const status = document.getElementById('status');
        const audioTitle = document.getElementById('audioTitle');
        const speaker = document.getElementById('speaker');
        const recordedDate = document.getElementById('recordedDate');
        const audioSelect = document.getElementById('audioSelect');

        let audioMetadata = {};
        let audioFiles = [];

        // ループ範囲
        let loopStart = null;
        let loopEnd = null;
        const loopStartBtn = document.getElementById('loopStartBtn');
        const loopEndBtn = document.getElementById('loopEndBtn');
        const loopClearBtn = document.getElementById('loopClearBtn');
        const loopRangeDisplay = document.getElementById('loopRangeDisplay');

        // クッキーに選択音源を保存
        function saveSelectedAudio(filename) {
            const expires = new Date();
            expires.setFullYear(expires.getFullYear() + 1);
            document.cookie = 'selectedAudio=' + encodeURIComponent(filename) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
        }

        // クッキーから選択音源を取得
        function getSelectedAudio() {
            const match = document.cookie.match(/(?:^|;\s*)selectedAudio=([^;]*)/);
            return match ? decodeURIComponent(match[1]) : null;
        }

        // CSVファイルを読み込んで音声メタデータを取得
        async function loadAudioMetadata() {
            try {
                const response = await fetch('audio_metadata.csv');
                const csvText = await response.text();
                const lines = csvText.trim().split('\n');

                // ヘッダー行をスキップして、データを解析
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line) {
                        const [filename, title, speakerName, date] = line.split(',');
                        audioMetadata[filename] = {
                            title: title,
                            speaker: speakerName,
                            recordedDate: date
                        };
                        audioFiles.push(filename);
                    }
                }

                // セレクトボックスのオプションを生成
                populateAudioSelector();
            } catch (error) {
                console.error('メタデータの読み込みに失敗しました:', error);
            }
        }

        // セレクトボックスにオプションを追加
        function populateAudioSelector() {
            audioSelect.innerHTML = '';
            audioFiles.forEach((filename) => {
                const option = document.createElement('option');
                option.value = filename;
                option.textContent = audioMetadata[filename].title;
                audioSelect.appendChild(option);
            });

            // クッキーに保存された音源があればそれを選択、なければ最新（最後）の音源を選択
            if (audioFiles.length > 0) {
                const saved = getSelectedAudio();
                const defaultFile = (saved && audioMetadata[saved]) ? saved : audioFiles[audioFiles.length - 1];
                audioSelect.value = defaultFile;
                changeAudio(defaultFile);
            }
        }

        // 音声情報を更新
        function updateAudioInfo() {
            const currentSource = audio.querySelector('source').src;
            const filename = currentSource.split('/').pop();

            if (audioMetadata[filename]) {
                const metadata = audioMetadata[filename];
                audioTitle.textContent = metadata.title;
                speaker.textContent = metadata.speaker;
                recordedDate.textContent = metadata.recordedDate;
            } else {
                audioTitle.textContent = '音声情報';
                speaker.textContent = '-';
                recordedDate.textContent = '-';
            }
        }

        // 音声ファイルを切り替える
        function changeAudio(filename) {
            // 音声ソースを変更
            audio.querySelector('source').src = filename;
            audio.load();

            // メタデータを更新
            updateAudioInfo();

            // 再生状態をリセット
            status.textContent = '';
            updatePlayPauseButton();

            // ループ範囲をリセット
            clearLoopRange();

            // 再生速度を1.0xにリセット
            audio.playbackRate = 1;
            document.querySelectorAll('.speed-button').forEach(b => b.classList.remove('active'));
            document.querySelector('.speed-button[data-speed="1"]').classList.add('active');
        }

        // セレクトボックス変更時のイベント
        audioSelect.addEventListener('change', (e) => {
            changeAudio(e.target.value);
            saveSelectedAudio(e.target.value);
        });

        // ページ読み込み時にメタデータを取得
        window.addEventListener('DOMContentLoaded', loadAudioMetadata);

        // リロードボタン
        const reloadBtn = document.getElementById('reloadBtn');
        reloadBtn.addEventListener('click', () => {
            location.reload();
        });

        // 再生/一時停止ボタンのテキストを更新
        function updatePlayPauseButton() {
            if (audio.paused) {
                playPauseBtn.textContent = '▶ 再生';
            } else {
                playPauseBtn.textContent = '⏸ 一時停止';
            }
        }

        // 再生/一時停止ボタン
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });

        // 5秒巻き戻しボタン
        rewindBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
            status.textContent = '5秒巻き戻しました';
        });

        // --- ループ範囲機能 ---
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        }

        function updateLoopRangeDisplay() {
            if (loopStart !== null && loopEnd !== null) {
                loopRangeDisplay.textContent = formatTime(loopStart) + ' → ' + formatTime(loopEnd) + ' をループ中';
            } else if (loopStart !== null) {
                loopRangeDisplay.textContent = formatTime(loopStart) + ' → （終了点を設定してください）';
            } else {
                loopRangeDisplay.textContent = '全体をループ再生';
            }
        }

        function clearLoopRange() {
            loopStart = null;
            loopEnd = null;
            updateLoopRangeDisplay();
        }

        loopStartBtn.addEventListener('click', () => {
            loopStart = audio.currentTime;
            // 開始点が終了点以降なら終了点をクリア
            if (loopEnd !== null && loopStart >= loopEnd) {
                loopEnd = null;
            }
            updateLoopRangeDisplay();
            status.textContent = '開始点を ' + formatTime(loopStart) + ' に設定しました';
        });

        loopEndBtn.addEventListener('click', () => {
            if (loopStart !== null && audio.currentTime <= loopStart) {
                status.textContent = '終了点は開始点より後に設定してください';
                return;
            }
            loopEnd = audio.currentTime;
            if (loopStart === null) {
                loopStart = 0;
            }
            updateLoopRangeDisplay();
            status.textContent = '終了点を ' + formatTime(loopEnd) + ' に設定しました';
        });

        loopClearBtn.addEventListener('click', () => {
            clearLoopRange();
            status.textContent = 'ループ範囲を解除しました（全体ループ）';
        });

        // timeupdate でループ範囲を監視
        audio.addEventListener('timeupdate', () => {
            if (loopStart !== null && loopEnd !== null) {
                if (audio.currentTime >= loopEnd) {
                    audio.currentTime = loopStart;
                }
            }
        });

        // --- 再生速度ボタン ---
        document.querySelectorAll('.speed-button').forEach(btn => {
            btn.addEventListener('click', () => {
                const speed = parseFloat(btn.dataset.speed);
                audio.playbackRate = speed;
                document.querySelectorAll('.speed-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                status.textContent = '再生速度: ' + speed + 'x';
            });
        });

        // 再生中の状態更新
        audio.addEventListener('play', () => {
            status.textContent = '再生中...';
            updatePlayPauseButton();
        });

        audio.addEventListener('pause', () => {
            if (audio.currentTime < audio.duration) {
                status.textContent = '一時停止中';
            }
            updatePlayPauseButton();
        });
    </script>
</body>
</html>
