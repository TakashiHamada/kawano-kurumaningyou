<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>稽古の音八 - 川野車人形練習専用プレイヤー</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="orientation-warning">
        <div class="orientation-warning-icon">📱</div>
        <div class="orientation-warning-text">画面を縦向きにしてください</div>
    </div>

    <div class="player-container">
        <button class="refresh-button" onclick="location.reload()">更新</button>
        <div class="app-header">
            <div class="app-header-sub">川野車人形　練習専用プレイヤー</div>
            <div class="app-header-title">稽古の音八</div>
            <div class="app-header-ruby">おとはち</div>
        </div>

        <div class="audio-selector">
            <select id="audioSelect">
                <option value="">音声を選択してください</option>
            </select>
        </div>

        <div class="audio-info" id="audioInfo">
            <h2 id="audioTitle">音声情報</h2>
            <div class="info-item">
                <span class="info-label">話者:</span>
                <span id="speaker">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">収録年月日:</span>
                <span id="recordedDate">-</span>
            </div>
            <button class="image-toggle" id="imageToggleBtn" aria-label="台本を表示" disabled><i class="fa-regular fa-image"></i></button>
        </div>

        <div class="image-inline" id="imageInline" hidden></div>

        <div class="audio-player">
            <audio id="audioPlayer" controls loop>
                <source src="" type="audio/mpeg">
                お使いのブラウザは音声再生に対応していません。
            </audio>
        </div>

        <div class="button-container">
            <button class="play-button" id="playPauseBtn">▶ 再生</button>
            <button class="play-button" id="rewindBtn">5秒戻す</button>
        </div>

        <div class="loop-controls">
            <div class="loop-controls-label">ループ範囲設定</div>
            <div class="loop-buttons">
                <button class="loop-button" id="loopStartBtn">ここから</button>
                <button class="loop-button" id="loopEndBtn">ここまで</button>
                <button class="loop-button clear-button" id="loopClearBtn">解除</button>
            </div>
            <div class="loop-range-display" id="loopRangeDisplay">全体をループ再生</div>
        </div>

        <div class="speed-controls">
            <div class="speed-buttons">
                <button class="speed-button" data-speed="0.6">0.6x</button>
                <button class="speed-button" data-speed="0.8">0.8x</button>
                <button class="speed-button active" data-speed="1">1.0x</button>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
